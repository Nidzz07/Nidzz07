name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics-main:
    runs-on: ubuntu-latest

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Nidzz07

          filename: github-metrics.svg

          base: header, activity, community, repositories, metadata

          plugin_followup: yes
          plugin_followup_sections: user
          plugin_stars: yes
          plugin_repositories: yes

  metrics-languages:
    needs: metrics-main
    runs-on: ubuntu-latest

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Nidzz07

          filename: github-metrics-languages.svg
          base: ""

          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 12

  metrics-activity:
    needs: metrics-languages
    runs-on: ubuntu-latest

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Nidzz07

          filename: github-metrics-activity.svg
          base: ""

          plugin_activity: yes
          plugin_activity_limit: 15
          plugin_activity_days: 30

  metrics-stats:
    needs: metrics-activity
    runs-on: ubuntu-latest

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Nidzz07

          filename: github-metrics-stats.svg

          base: activity, community, repositories