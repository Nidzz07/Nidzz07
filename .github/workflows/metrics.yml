name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics-languages:
    runs-on: ubuntu-latest

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Nidzz07

          filename: github-metrics-languages.svg
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 12

  metrics-activity:
    runs-on: ubuntu-latest
    needs: metrics-languages

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Nidzz07

          filename: github-metrics-activity.svg
          base: ""
          plugin_activity: yes
          plugin_activity_limit: 15
          plugin_activity_days: 30

  metrics-stats:
    runs-on: ubuntu-latest
    needs: metrics-activity

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Nidzz07

          filename: github-metrics-stats.svg
          base: activity, community, repositories

  metrics-main:
    runs-on: ubuntu-latest
    needs: metrics-stats

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Nidzz07

          filename: github-metrics.svg
          base: header, activity, community, repositories

  metrics-trophies:
    runs-on: ubuntu-latest
    needs: metrics-main

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Nidzz07

          filename: github-trophies.svg
          base: ""
          plugin_achievements: yes